name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置Node.js环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # 3. 安装依赖（如果有）
      - name: Install dependencies
        run: npm install || echo "No package.json found"

      # 4. 注入Token（关键步骤）
      - name: Inject GitHub Token
        run: |
          # 检查文件是否存在
          if [ -f "index.html" ]; then
            # 将占位符替换为实际的Token
            sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.TOKEN }}/g" index.html
            echo "Token injected successfully"
            # 验证替换是否成功
            if grep -q "ghp_" index.html; then
              echo "✅ Token found in index.html"
            else
              echo "❌ Token not found in index.html"
              exit 1
            fi
          else
            echo "index.html not found"
            exit 1
          fi

      # 5. 部署到GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: false
          force_orphan: true

      # 6. 部署完成通知
      - name: Deployment complete
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Website: https://${{ github.repository_owner }}.github.io/"